outputs:
  username_hashed:
    description: Lower-cased GitHub username hash used in the Beamup remote path.
    value: ${{ steps.hash.outputs.username_hashed }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        BEAMUP_HOST: ${{ inputs.beamup_host }}
        USERNAME_GITHUB: ${{ inputs.username_github }}
        PROJECT_NAME: ${{ inputs.project_name }}
      run: |
        set -euo pipefail
        [ -n "$SSH_PRIVATE_KEY" ] || { echo "Error: ssh_private_key input is required"; exit 1; }
        [ -n "$BEAMUP_HOST" ] || { echo "Error: beamup_host input is required"; exit 1; }
        [ -n "$USERNAME_GITHUB" ] || { echo "Error: username_github input is required"; exit 1; }
        [ -n "$PROJECT_NAME" ] || { echo "Error: project_name input is required"; exit 1; }

    - name: Setup SSH
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        printf '%s\n' "${{ inputs.ssh_private_key }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        printf '%s' "${{ inputs.sync_key_base32 }}" | tr -d '\r\n ' | base32 --decode > ~/.ssh/sync_key
        chmod 600 ~/.ssh/sync_key

        ssh-keyscan -H "${{ inputs.beamup_host }}" >> ~/.ssh/known_hosts

    - name: Sync GitHub keys with Beamup
      shell: bash
      run: |
        set -euo pipefail
        ssh -i ~/.ssh/sync_key dokku@"${{ inputs.beamup_host }}" sync-github-keys "${{ inputs.username_github }}"

    - name: Generate username hash
      id: hash
      shell: bash
      run: |
        set -euo pipefail
        github_user_hashed=$(printf '%s\n' "${{ inputs.username_github }}" | tr '[:upper:]' '[:lower:]' | shasum -a 256 | cut -c1-12)
        echo "username_hashed=${github_user_hashed}" >> "$GITHUB_OUTPUT"

    - name: Configure Git and Deploy
      shell: bash
      run: |
        set -euo pipefail
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"

        remote_url="dokku@${{ inputs.beamup_host }}:${{ steps.hash.outputs.username_hashed }}/${{ inputs.project_name }}"
        if git remote get-url beamup > /dev/null 2>&1; then
          git remote set-url beamup "$remote_url"
        else
          git remote add beamup "$remote_url"
        fi

        GIT_SSH_COMMAND="ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes" git push beamup HEAD:master --force

    - name: Cleanup
      if: ${{ always() }}
      shell: bash
      run: |
        rm -f ~/.ssh/id_rsa ~/.ssh/sync_key
